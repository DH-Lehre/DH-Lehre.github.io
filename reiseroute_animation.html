", "context": "oder aneinander hangende Berge wehren ; Es iſt aber oben ein gleich [eben Land] / ohne Walt / bequem zum Ackerbaw / vnd ſol in ſolcher"}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-11", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": "Isbuiletz , Troitzka Slowoda . Dudina monastir vnd Nofimki vorbey gefahren / [kamen wir gegen den Abend vor] die Vor Niſen ankommen . fuͤrnehme Stadt Niſen oder Niſonowgorod an ."}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-11", "type": "Unterbrechung", "color": "#118ab2", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": " [Weil das Schiff aber noch nicht allerdinges Segelfertig / blieben wir auff demſelden vor Niſen biß in die dritte Woche ſtille ligen .] Vnter- deſſen wurden die Geſandten von etlichen fuͤrnehmen Ruſſen vnnd Deutſchen zu"}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-13", "type": "Geselliges Ereignis", "color": "#264653", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": "Vnter- deſſen wurden die Geſandten von etlichen fuͤrnehmen Ruſſen vnnd Deutſchen zu [vnterſchiedlichen mahlen beſuchet] / welche wir vnter ei- nem am Vfer auffgeſchlagenem Gezelte tractireten ."}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-14", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": ", ſo Er jtzo in dieſer function vom Großfuͤrſten haͤtte . Diß [Gezaͤncke] wehrete faſt eine halbe Stunde uͤber der Taffel / ohne ſchewe vor"}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-24", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": "Er vns nicht alleine wol vnd ſtattlich empfienge / herꝛlich tractirete , [ſondern auch bey vnſerm Auffbruche 20. ſeiten Speck vnd andern Proviant auff die Reiſe verehrete .] Er war ſonſt ein hoͤfflicher vnd kluger Mann ; hielte in ſeinem"}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-24", "type": "Diplomatische Begegnung", "color": "#e9c46a", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": "einen anſehn- Des Weywo- den zu Niſen Lob . lichen ſtatt . [Dann als wir vns durch vnſern Priſtaffen anmelden lieſ- ſen / wurden wir in dem Hoffe durch einen rein gekehrten Gang / wel- cher auff beyden ſeiten mit Knechten vnnd Slaven beſetzet / biß an die Stiege durch 2. Perſonen gefuͤhret ; Jm Vorhauſe von zweyen an- ſehnlichen alten Maͤnnern empfangen / zum Weywoden in die Stube / welche mit Tapeten / Vorhaͤngen / ſilbern Schalen vnd Bechern ge- zieret / gebracht ; Der Weywode ſtund im guͤlden Stuͤck / mit vielen wol außgeputzeen Maͤnnern vmbgeben / empfieng vns freundlich / danckte fuͤr den Gruß vnd Geſchencke der Geſandten mit vielen ehrer- bietenden Worten / noͤtigte vns darauff an eine Taffel zuſitzen / da Er dann J. Z. Maj. J. F. Gn. zu Holſtein vnd dero Geſandten Ge- ſundheiten anfienge .] Vnd vnter dem tractiren , ſo mit Pfefferkuchen / ſtarcken Brandwein vnd"}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-30", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": "vnangeſehn / das der Wind vns con- trari war / vnd lavirten [darvon] . Es waren bey vns auff dem Schiffe J. F. Gn. Commiſſarius"}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-07-30", "type": "Unterbrechung", "color": "#118ab2", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": "Stadt hinter Grammatins Gute l. gegen das Kloſter Petzora r. kommen / [erreichten wir ſchon den Grund vnd blie- ben ſitzen] ; muſten ein Ancker außbringen / vnd das Schiff mit groſſer Arbeit"}, {"lat": 56.326944444, "lon": 44.0075, "date": "1635-08-01", "type": "Unterbrechung", "color": "#118ab2", "place": "Nischni Nowgorod", "teil": "Teil 3.1", "context": "Rudern fort zukommen ; Aber nach eines Buͤchſen-ſchuſſes lenge ge- rieten wir [wiederumb auff den Grund] / da wir von de ion . ten noch getaufft werden ; W [enn] Es wohnete zu Caſan in meines Wirtheshauſe ein Ceremiſſe , ein Mann"}, {"lat": 45.695, "lon": 47.8975, "date": "1635-08-10", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Wolga", "teil": "Teil 3.1", "context": "an den Wall / an welchen wir etliche Stunden haͤngen blieben . [Allhier ſtieg ich mit dem von Mandelslo ans Land / giengen in den Buſch vns zu verluſtiren vnd Waltfruͤchte zuſuchen / vnter deſſen aber da der Wind zufugen begunte / zogen Sie die Segel auff / vnd ſuhren darvon ; Als] Reiſe Beſchreibung. Als wir wieder an den Strand kamen / vnd kein"}, {"lat": 45.695, "lon": 47.8975, "date": "1635-08-12", "type": "Tragödie", "color": "#06d6a0", "place": "Wolga", "teil": "Teil 3.1", "context": "Den 12. Dito verſuchten wir das [Schiff mit huͤlffe eines Drag- gens oder kleinen Anckers vmb die Ecke zuziehen ; der Dragge aber hatte an einen im Grunde liegenden Baum gefaſſet / zerreiß das Ka- beltaw / vnd bliebe liegen .] Die Wolge nimpt viel Ancker weg . ſen / das dahero ſo"}, {"lat": 55.790833333, "lon": 49.114444444, "date": "1635-08-12", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Kasan", "teil": "Teil 3.1", "context": "Auff den Abend aber Vor Caſan ankommen . kamen wir vor der [Stadt] Caravana vor vns funden . Bey der- Pag. 100. &amp; 103 ."}, {"lat": 55.125, "lon": 14.916666666, "date": "1635-10-28", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Bornholm", "teil": "Teil 2", "context": " [Den folgenden Tag / als den 28 fruͤhe vmb 5 Vhr Zu Segel gangen . giengen wir nach gehaltener Betſtunde in Gottes Namen zu Segel] "}, {"lat": 56.75, "lon": 16.63333, "date": "1635-10-29", "type": "Tragödie", "color": "#06d6a0", "place": "Öland", "teil": "Teil 2", "context": "vnd der Medicus Hartman Graman hatten vns beredet / wans ja zum [Schiffbruche] kommen ſol- te / wolten wir als alte Freunde einander in die"}, {"lat": 56.732388888, "lon": 16.449280555, "date": "1635-10-30", "type": "Tragödie", "color": "#06d6a0", "place": "Kalmarsund", "teil": "Teil 2", "context": "/ vnd ſie auff zweymahl außfuͤhrete / ohne einen / nemblich den [Schiffszimmerman] / welcher / weil Er nichts ergreiffen kunte / fuͤr vnſern Augen"}, {"lat": 56.647380776, "lon": 16.480429432, "date": "1635-11-01", "type": "Unterbrechung", "color": "#118ab2", "place": "Färjestaden", "teil": "Teil 2", "context": " [Allhier] wurden Johan Voigt vnd Steen Jenſen wieder zu ruͤcke durch Dennemarcken nach"}, {"lat": 56.664286111, "lon": 16.365633333, "date": "1635-11-03", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Kalmar", "teil": "Teil 2", "context": "vns auff eine halbe Meile durch die flache Grunde zeigen muſten . [Vnd] giengen den 3 Dito im Namen Gottes wieder zu Segel / kamen"}, {"lat": 56.75, "lon": 16.63333, "date": "1635-11-03", "type": "Tragödie", "color": "#06d6a0", "place": "Öland", "teil": "Teil 2", "context": "Oeland / vnd lieffen dieſe Nacht vmb daſſelbe / mit einem ſo [grawſamen Sturm] auß Nordoſt / daß das fordertheil des Schiffs mehr vnter / als"}, {"lat": 58.884166666, "lon": 22.644444444, "date": "1635-11-06", "type": "Unterbrechung", "color": "#118ab2", "place": "Hiiumaa", "teil": "Teil 2", "context": "Abend anſichtig worden / Zur Nacht aber trieben wir abermahl mit einem [Sturm] nach der Lin- cken zur Seewertz ."}, {"lat": 59.437222222, "lon": 24.745, "date": "1635-11-07", "type": "Unterbrechung", "color": "#118ab2", "place": "Tallinn", "teil": "Teil 2", "context": "Ancker / vnd iſt den andern Tag vor Reval ſicher ankommen . [Vnſer Schiffer vnd Ste- werman aber / ob wir ſchon den gantzen Nachmittag die Liefflaͤndiſche Gegend / nemblich das groſſe Rogge ſtets vor Augen hatten / vnd den Abend nicht uͤber eine gute Meile vom Eyland Nargen / ſo an den Revaliſchen Hafen lieget / wahren / getraweten ſich doch nicht auff das Lot vollend einzulauffen / oder gleich der Schuten Ancker zu werffen / wiewol ſie dar zu vermahnet wurden :] Trieben alſo wieder in Maſt vnnd Maiſan zer- brochen vnd giengen uͤber"}, {"lat": 60.10454, "lon": 22.31504, "date": "1635-11-09", "type": "Tragödie", "color": "#06d6a0", "place": "Högland", "teil": "Teil 2", "context": "uͤber vnſers Medici Schlaff ſtelle . Ein Boetsman / welcher zu ſeinem [Vngluͤck] auff dem uͤberlauff ſtund / ward durch ein Tau darnieder geſchlagen /"}, {"lat": 60.10454, "lon": 22.31504, "date": "1635-11-09", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Högland", "teil": "Teil 2", "context": "Da wuſten wir abermahl nicht wo wir hinſolten . [Dem] Haupt- Boetsman Juͤrgen Steffens fiele endlich ein / daß zwar eine Jnſel"}, {"lat": 60.10454, "lon": 22.31504, "date": "1635-11-09", "type": "Unterbrechung", "color": "#118ab2", "place": "Högland", "teil": "Teil 2", "context": " [Den] 9 Dito blieben wir in gutem Wetter fuͤr Ancker liegen / flick-"}, {"lat": 59.437222222, "lon": 24.745, "date": "1635-11-09", "type": "Tragödie", "color": "#06d6a0", "place": "Tallinn", "teil": "Teil 2", "context": "waͤre groſſe Noth verhanden : Vnd lieſſe ſich alles zu einem gefaͤhrlichen [Schiff- bruche] an ."}, {"lat": 60.10454, "lon": 22.31504, "date": "1635-11-09", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Högland", "teil": "Teil 2", "context": " [Am] ſelben Orte der Jnſel waren fuͤnff Fiſcher Huͤtten / in wel- chen"}, {"lat": 60.10454, "lon": 22.31504, "date": "1635-11-09", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Högland", "teil": "Teil 2", "context": "Weil wir auff dieſer [Jnſel] allem Anſehen nach eine zeitlang blei- ben ſolten / vnd nicht wuſten"}, {"lat": 59.437222222, "lon": 24.745, "date": "1635-11-12", "type": "Unterbrechung", "color": "#118ab2", "place": "Tallinn", "teil": "Teil 2", "context": " [Den] 12 kamen 2 Finlaͤndiſche Boͤte / auch durch Vn- gewitter verſchlagen bey"}, {"lat": 59.437222222, "lon": 24.745, "date": "1635-11-13", "type": "Unterbrechung", "color": "#118ab2", "place": "Tallinn", "teil": "Teil 2", "context": "Cammer-Juncker zu Got- torff) Reiſe Beſchreibung. torff ) mit einem Lackeyen / [den] 13 dieſes / da der Sturm ſich geleget / vorauß ans feſte"}, {"lat": 60.10454, "lon": 22.31504, "date": "1635-11-17", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Högland", "teil": "Teil 2", "context": " [Den] 17 Dito haben ſich die Geſandten jeglicher mit 5 Perſonen in zwey"}, {"lat": 59.0, "lon": 26.0, "date": "1635-11-18", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Estland", "teil": "Teil 2", "context": "/ zu verehren / wann wir fuͤr Abend ans Land kaͤmen . [Die] Fiſcher grieffen die Ruder friſch an / vnd ſtreckten alle jhre Leibes"}, {"lat": 59.500833333, "lon": 26.5275, "date": "1635-11-18", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Kunda", "teil": "Teil 2", "context": " [Von] dar wanten wir vns ingeſampt nach Kunda , auff Herꝛn Johan Muͤllers"}, {"lat": 59.500833333, "lon": 26.5275, "date": "1635-11-18", "type": "Unterbrechung", "color": "#118ab2", "place": "Kunda", "teil": "Teil 2", "context": "Schwieger-Vaters Hoff / welcher nur 2 Meilen vom ſelbigen Strande lieget . [Daſelbſt] wir drey Wochen ſtille liegen blichen / vnd wurden wegen des außgeſtandenen"}, {"lat": 37.2774, "lon": 49.589, "date": "1636-09-13", "type": "Diplomatische Begegnung", "color": "#e9c46a", "place": "Gilan", "teil": "Teil 3.1", "context": "Strelitzen / deren die Caravana 400. zur Convoi bey ſich hatten / [zu vnſerm Schiffe / ließ die Geſandten begruͤſſen / vnd nach jhre Geſundheit fragen] Als ſie vors Schiff kamen / hielten ſie erſt ſtille / vnd"}, {"lat": 32.0, "lon": 53.0, "date": "1636-09-13", "type": "Diplomatische Begegnung", "color": "#e9c46a", "place": "Iran", "teil": "Teil 3.1", "context": "einer rauhen weiſſen Tuͤrckiſchen Decken / hatte die Beine nach jhrer manir [vnter ſich geſchlagen / vnd den Ruͤcken an ein roth Atlaß Kuͤſſen gelehnet / empfieng vns freundlich :] Ceremonien gebrau- chen ſie bey empfangung jhrer Gaͤſte : Er noͤtigte vns"}, {"lat": 55.750555555, "lon": 37.6175, "date": "1636-09-13", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Moskau", "teil": "Teil 3.1", "context": ". Fuhren alſo nach dem abermahl auff allen Schiffen vnd Boͤten Salve [gege- ben ward / mit einander fort .] "}, {"lat": 55.750555555, "lon": 37.6175, "date": "1636-09-13", "type": "Tragödie", "color": "#06d6a0", "place": "Moskau", "teil": "Teil 3.1", "context": "Gegen den Abend erhub ſich [mit einem geſchwinden Sturm ein Donnerwetter vnd Platzregen] / in welchem zwey harte Schlaͤge geſcha- hen / aber bald darauff"}, {"lat": 48.708611111, "lon": 44.514722222, "date": "1636-09-17", "type": "Begegnung mit dem Fremden", "color": "#2a9d8f", "place": "Wolgograd", "teil": "Teil 3.1", "context": "Laͤnder geſehn / darauff pfiegt der Weywode in der neheſten Stadt die [raͤuberiſchen] Coſaken auffzuhencken . Es ſol aber keiner uͤber 8. Tage daran hencken"}, {"lat": 46.35, "lon": 48.035, "date": "1636-09-17", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Astrachan", "teil": "Teil 3.1", "context": " [Heute begegnete vns eine groſſe Schute / deren etliche auff einem kleinen Bote an Bort kamen / berichteten / daß Sie vor 3. Wochen von Aſtrachan abgereiſet / vnterwegens von 30. Coſaken angefallen / vnd alles Proviants beraubet worden / daß ſie in 4. Tagen nichts gegeſſen .] Baten vmb etwas Brodt ſich des hungers zuerwehren / biß ſie etwa"}, {"lat": 48.708611111, "lon": 44.514722222, "date": "1636-09-17", "type": "Systematische Beschreibung", "color": "#fb5607", "place": "Wolgograd", "teil": "Teil 3.1", "context": "gieng zur Lincken vorbey . Zwiſchen dem Berge vnd Eyland gibt es [einen engen krummen Schlundt] / in welchen vor wenig Jahren die Coſaken etliche hundert Strelitzen jhre"}, {"lat": 48.708611111, "lon": 44.514722222, "date": "1636-09-17", "type": "Geselliges Ereignis", "color": "#264653", "place": "Wolgograd", "teil": "Teil 3.1", "context": " [Gegen den Abend brachte ein Fiſcher einen vns vnbekanten Fiſch Tziberika ein Fiſch . an Bort] Tziberika nanten / war uͤber drittehalb Elen lang / hatte einen breiten"}, {"lat": 48.708611111, "lon": 44.514722222, "date": "1636-09-17", "type": "Systematische Beschreibung", "color": "#fb5607", "place": "Wolgograd", "teil": "Teil 3.1", "context": "an Bort Tziberika nanten / war uͤber drittehalb Elen lang / hatte [einen breiten langen Schnabel wie ein Ente] / auff den Ruͤ- cken vnd beyden ſeiten ſchwartz vnd weiſſe Flecke"}, {"lat": 48.283333333, "lon": 46.166666666, "date": "1636-09-18", "type": "Unterbrechung", "color": "#118ab2", "place": "Achtubinsk", "teil": "Teil 3.1", "context": "vns ſampt der Caravana an ein Eyland Oßino , ſo 7. W. [von der Stadt vor Ancker / vnd hatten dieſen Tag 135.] W. geſegelt ."}, {"lat": 46.35, "lon": 48.035, "date": "1636-09-18", "type": "Systematische Beschreibung", "color": "#fb5607", "place": "Astrachan", "teil": "Teil 3.1", "context": "ſuͤß Holtz ſehr haͤuffig vnd dicke / wirfft / ſonderlich allhier / [ſeinen Stengel uͤber halb Mann hoch in die hoͤhe] / deſſen Saame in langen Schalen als ſchwartze Wicken . Dergleichen funden"}, {"lat": 55.750555555, "lon": 37.6175, "date": "1636-09-19", "type": "Systematische Beschreibung", "color": "#fb5607", "place": "Moskau", "teil": "Teil 3.1", "context": "man auſſerhalb des Strandes ſonderlich zur rechten Hand keine Baͤume mehr / [ſondern nur duͤrre verbrandt Erdreich vnd Heyde] ."}, {"lat": 55.750555555, "lon": 37.6175, "date": "1636-09-20", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Moskau", "teil": "Teil 3.1", "context": "W. fort kommen kunten . Gegen Abend brach- ten vns etliche Fiſcher [einen ſehr groſſen fetten Carpen] uͤber 30. pfund ſchwer / vnd 8. groſſe Sandaten , dergleichen wir"}, {"lat": 62.06767, "lon": 35.22345, "date": "1636-09-21", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Holzkirchen von Kischi Pogost", "teil": "Teil 3.1", "context": "Nacht / da die Ordnung der Wache den Geſandten Bruͤgman traff / [trieb mitten im Strome ein groß Bot ſtille vnſer Schiff vorbey] / Als aber anfaͤnglich auff vnſer zuruffen / niemand ant- worten vnd"}, {"lat": 48.708611111, "lon": 44.514722222, "date": "1636-09-22", "type": "Ankunft / Aufbruch", "color": "#e63946", "place": "Wolgograd", "teil": "Teil 3.1", "context": "war / wolten wir denſelben nicht gerne vergebens vorbey ſtreichen laſſen / [machten vns derwegen gegen den morgen vmb 3. Vhr wieder auff] / vnd beka- men alsbald am Backbort einen andern Außgang der Wolga"}, {"lat": 58.883333333, "lon": 164.066666666, "date": "1636-09-22", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Karaginski", "teil": "Teil 3.1", "context": " [Nach dieſem erſahen wir von ferne auff einem Sandhuͤgel eine groſſe ertrunckene Struſe / vnd weil ſie vnſer etlichen als eine auffge- worffene Schantze der Coſaken vorkam / auch auß dem Buſche etliche Coſaken ſich ſolten haben ſehen laſſen / muſten die Voͤlcker ins Ge- wehr / vnd wurde befohlen / das etliche Schuͤſſe in den Buſch gethan] Ruͤchen- knecht koͤmpt zu ſchaden . wurden . Da dann vnſerm Kuͤchenknecht"}, {"lat": 46.35, "lon": 48.035, "date": "1636-09-23", "type": "Direkte Beobachtung", "color": "#f4a261", "place": "Astrachan", "teil": "Teil 3.1", "context": "Beer als die ziemlichen Wall- nuͤſſe groß / wie auch groſſe ſeh [r] "}, {"lat": 48.708611111, "lon": 44.514722222, "date": "1636-09-23", "type": "Systematische Beschreibung", "color": "#fb5607", "place": "Wolgograd", "teil": "Teil 3.1", "context": "namhafften oͤrter / zu denen wir heute gelangeten / wahren ; Mituske [l. ein außtretendes Waſſer / ſo theils in den geſtrigen Bach / theils nach ethchen W. wieder in die Wolga ſich begibt] Weil zwiſchen zweyen vor demſelben gelege- nen Eylaͤndern ſich etliche Coſaken ſehen"}, {"lat": 42.0, "lon": 50.5, "date": "1636-09-23", "type": "Systematische Beschreibung", "color": "#fb5607", "place": "Kaspisches Meer", "teil": "Teil 3.1", "context": "/ an groͤſſe aber uͤbertreffen ſie einen Schwan / haben einen be e": "Tereki", "teil": "Teil 4", "context": " [Wir brachen alſo den 4. Junij Nachmittage von Terki wider auff / vnd giengen die oberwehnte groſſe Heyde an / der Weg gieng nicht fer- ne von der See / auff welchem wir in 11. Tagen weder Stadt noch Dorff ( wider die allgemeine Land Charte ) Baͤum / Huͤgel / Rivier / ( außge- nommen] Kiſilar ) oder einig Gevoͤgel / ſondern lauter Eben / wuͤſte /"}];
const TEIL_LABELS = {"1": "Teil 1", "2": "Teil 2", "3-1": "Teil 3.1", "3-2": "Teil 3.2", "4": "Teil 4"};

const map = L.map('map').setView([48, 52], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap, &copy; CARTO', maxZoom: 18
}).addTo(map);

const slider  = document.getElementById('date-slider');
const dateLbl = document.getElementById('date-label');
const stepInfo= document.getElementById('step-info');
const btnPlay = document.getElementById('btn-play');
slider.max = MARKERS.length - 1;

// Zustand: locKey → { lat, lon, events: [...], layer }
const locMarkers = {};
let visibleUpTo = -1;
let timer = null;
let playing = false;

function getLocKey(m) {
  return m.lat.toFixed(4) + ',' + m.lon.toFixed(4);
}

function makeIcon(events) {
  const n = events.length;
  const color = events[events.length - 1].color;
  const size = Math.min(10 + n * 3, 36);
  const label = n > 1 ? String(n) : '';
  const fs = Math.round(size * 0.42);
  return L.divIcon({
    className: '',
    html: '<div style="'
        + 'width:' + size + 'px;height:' + size + 'px;border-radius:50%;'
        + 'background:' + color + ';border:2px solid rgba(0,0,0,0.22);'
        + 'display:flex;align-items:center;justify-content:center;'
        + 'color:#fff;font-weight:bold;font-size:' + fs + 'px;'
        + 'box-shadow:0 1px 4px rgba(0,0,0,.3);box-sizing:border-box;'
        + 'cursor:pointer'
        + '">' + label + '</div>',
    iconSize:   [size, size],
    iconAnchor: [size / 2, size / 2],
    popupAnchor:[0, -size / 2],
  });
}

function makePopup(events) {
  var rows = events.map(function(e) {
    return '<div style="margin:5px 0;padding:6px 8px;background:#f8f6f1;border-radius:4px;line-height:1.45">'
      + '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:' + e.color
      + ';margin-right:5px;vertical-align:middle"></span>'
      + '<b>' + e.type + '</b>&nbsp;'
      + '<span style="color:#888;font-size:.82em">' + e.date + ' · ' + e.teil + '</span>'
      + '<br><i style="font-size:.82em;color:#444">' + e.context + '</i>'
      + '</div>';
  }).join('');
  var header = '<div style="font-family:Georgia,serif">'
    + '<b style="font-size:.95em">' + events.length + ' Ereignis' + (events.length > 1 ? 'se' : '')
    + ' · <i>' + events[0].place + '</i></b>'
    + '<hr style="margin:5px 0">' + rows + '</div>';
  return header;
}

function makeTooltip(events) {
  var n = events.length;
  var last = events[events.length - 1];
  return (n > 1 ? '<b>' + n + ' Ereignisse</b><br>' : '<b>' + last.type + '</b><br>') + last.date;
}

function rebuildMarker(locKey) {
  var loc = locMarkers[locKey];
  if (loc.layer) { map.removeLayer(loc.layer); loc.layer = null; }
  var marker = L.marker([loc.lat, loc.lon], { icon: makeIcon(loc.events) });
  marker.bindTooltip(makeTooltip(loc.events));
  marker.bindPopup(makePopup(loc.events), { maxWidth: 390 });
  marker.addTo(map);
  loc.layer = marker;
}

function showUpTo(idx) {
  if (idx === visibleUpTo) return;
  if (idx < visibleUpTo) {
    // Zurücksetzen: alle Marker entfernen
    Object.values(locMarkers).forEach(function(loc) {
      if (loc.layer) map.removeLayer(loc.layer);
    });
    for (var k in locMarkers) delete locMarkers[k];
    visibleUpTo = -1;
  }
  for (var i = visibleUpTo + 1; i <= idx; i++) {
    var m = MARKERS[i];
    var key = getLocKey(m);
    if (!locMarkers[key]) {
      locMarkers[key] = { lat: m.lat, lon: m.lon, events: [], layer: null };
    }
    locMarkers[key].events.push(m);
    rebuildMarker(key);
  }
  visibleUpTo = idx;
  var cur = MARKERS[idx];
  dateLbl.textContent = cur.date;
  stepInfo.textContent = (idx + 1) + ' / ' + MARKERS.length + ' Ereignisse';
  slider.value = idx;
}

function step() {
  var next = visibleUpTo + 1;
  if (next >= MARKERS.length) { stopAnim(); return; }
  showUpTo(next);
}

function startAnim() {
  if (playing) return;
  playing = true;
  btnPlay.textContent = '⏸ Pause';
  var ms = parseInt(document.getElementById('speed').value);
  timer = setInterval(step, ms);
}
function stopAnim() {
  playing = false;
  btnPlay.textContent = '▶ Play';
  if (timer) { clearInterval(timer); timer = null; }
}
function resetAnim() {
  stopAnim();
  Object.values(locMarkers).forEach(function(loc) {
    if (loc.layer) map.removeLayer(loc.layer);
  });
  for (var k in locMarkers) delete locMarkers[k];
  visibleUpTo = -1;
  dateLbl.textContent = '—';
  stepInfo.textContent = '';
  slider.value = 0;
}

btnPlay.addEventListener('click', function() {
  if (playing) stopAnim(); else startAnim();
});
slider.addEventListener('input', function() {
  stopAnim();
  showUpTo(parseInt(this.value));
});
document.getElementById('speed').addEventListener('change', function() {
  if (playing) { stopAnim(); startAnim(); }
});

// Startzustand
showUpTo(0);
</script></body></html>
